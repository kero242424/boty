name: Python Cezaci Bot

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Repoyu Cek
      uses: actions/checkout@v3

    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Gerekli Kutuphaneleri Indir
      run: pip install -r requirements.txt

    - name: Botu Atesle
      run: python bot.py
