name: Discord Bot Continuous Runtime

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_once_mode:
        description: 'Tek seferlik görev modu mu? (true/false)'
        required: true
        default: 'false'

jobs:
  run-discord-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu Repodan Çek
      uses: actions/checkout@v4

    - name: Python Ortamını Hazırla
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Bot Motorunu Ateşle
      env:
        # Kodun içindeki tokenı okuyacak, ekstra GitHub Secret ayarına gerek kalmayacak
        RUN_ONCE: ${{ github.event.inputs.run_once_mode || 'false' }}
      run: python bot.py
