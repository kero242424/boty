name: Discord Bot 24/7

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Her 6 saatte bir tetiklenerek botun düşmesini engeller
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Repo'yu Kopyala
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Botu Başlat
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      run: |
        python bot.py &
        # Botun arkaplanda kesintisiz çalışması için bekleme döngüsü (Actions süresince veya cron yenilenene kadar)
        sleep 21600
